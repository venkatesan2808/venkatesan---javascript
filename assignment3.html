<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>


<h1 id="change">hello everyone </h1>
<button onclick="change()">change</button>

<h2 id="changestyles">change style</h2>
<button onclick="changestyleed()">style</button>

<p id="para">Lorem ipsum dolor sit amet consectetur, adipisicing elit. Ullam, voluptas quis itaque, officia ex, neque tenetur nam doloremque qui quaerat minima. Molestiae, illum. Eius fugit corporis, fuga commodi optio labore.</p>
<button onclick="changepara()">change para</button>


<script>
function change() {
let change=document.getElementById("change");
change.textContent="thank you"
}


function changestyleed(){
    var changestyle=document.getElementById("changestyles")
    changestyle.style.color= "blue";
    changestyle.style.backgroundColor="black";
    changestyle.style.fontSize="50px";
}

function changepara() {
let change=document.getElementById("para");
change.textContent="para changed !"
}



</script>

</body>
</html>
