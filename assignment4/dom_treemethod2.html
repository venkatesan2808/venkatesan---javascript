<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   
 

<!-- click event -->
<button id="click">click event</button>
<p id="result"></p>

<!-- input event -->
 enter:<input type="text" id="input">
<p id="result2"></p>

<!-- submit event -->

<form id="form"> 
    <label for="age">Enter your age:</label> 
    <input type="number" id="age" required /> 
    <button type="submit">Submit</button> 
  </form> 
  <p id="formage"></p> 
 



<script>
    const click=document.getElementById("click")         //click
    const result=document.getElementById("result")

    click.addEventListener( "click" , () => {
        result.textContent="show theb click event"
    }
    )

    const click2=document.getElementById("input")       //input
    const result2=document.getElementById("result2")

    click2.addEventListener( "input" , function (){
        result2.textContent= "print:" +this.value;
    })

     
    const form=document.getElementById("form")         //submit
    const formage=document.getElementById("formage")

    form.addEventListener( "submit" , function (a){
     a.preventDefault();

     const   age=document.getElementById("age").value
     formage.textContent="age submited:" +   age ;
    
    })
    




</script>
</body>
</html>
